function closeDrawer(){document.getElementById('drawer').classList.remove('open')}
function head(code,title,sub){return `<div class="head"><div><div class="eyebrow">${code}</div><div class="title">${title}</div><div class="subtitle">${sub}</div></div><div class="actions"><button class="btn" onclick="window.print()">طباعة</button><button class="btn" onclick="document.documentElement.requestFullscreen?.()">عرض</button></div></div>`}
function node(x,y,w,h,t,id,c='gold',sub=''){let fill=c=='blue'?'rgba(75,141,248,.13)':c=='teal'?'rgba(45,212,191,.12)':c=='purple'?'rgba(167,139,250,.11)':'rgba(201,168,76,.11)';let stroke=c=='blue'?'rgba(75,141,248,.42)':c=='teal'?'rgba(45,212,191,.38)':c=='purple'?'rgba(167,139,250,.34)':'rgba(201,168,76,.42)';return `<g class="node" onclick="openDrawer('${id}','${t}')"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="14" fill="${fill}" stroke="${stroke}"/><text x="${x+w/2}" y="${y+30}" text-anchor="middle" fill="${c=='gold'?'#E8D084':'#F4F1EA'}" font-size="13" font-weight="800">${t}</text>${sub?`<text x="${x+w/2}" y="${y+53}" text-anchor="middle" fill="#8994AA" font-size="10">${sub}</text>`:''}</g>`}
function line(x1,y1,x2,y2,cls='soft-line'){return `<line class="${cls}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`}
function board(svg,h=540){return `<div class="board"><svg viewBox="0 0 1200 ${h}" xmlns="http://www.w3.org/2000/svg">${svg}</svg></div>`}
function home(){return head('RAHAIL OPERATING SYSTEM','شركة رحائل — نظام رحائل التشغيلي','منصة تنفيذية موحدة لإدارة التجارب والمرافق السياحية في حائل')+`<div class="grid4"><div class="card metric"><small>الأقسام العاملة</small><b>١٧</b><p>تنقل فعال ومحتوى تنفيذي في كل صفحة</p></div><div class="card metric"><small>الملاك التنفيذيون</small><b>٩</b><p>رؤساء محددون وليس عبارات عامة</p></div><div class="card metric"><small>بوابات القرار والجودة</small><b>٢٨</b><p>مرتبطة بالتشغيل والمخاطر</p></div><div class="card metric"><small>مؤشرات قياس</small><b>٣٦</b><p>معادلات وطريقة حساب واضحة</p></div></div><div class="panel">${board(node(485,40,230,70,'نظام رحائل التشغيلي','exec-review','gold','تشغيل • حوكمة • قياس')+['العملاء','الشركاء','التجارب','المرافق','الجودة','البيانات'].map((t,i)=>node(90+i*175,200,135,64,t,['customer','partners','experience','operations','quality','finance'][i],i%2?'blue':'teal','مالك محدد')).join('')+[0,1,2,3,4,5].map(i=>line(600,110,157+i*175,200,'solid-line')).join(''),360)}</div>`}
function arch(){return head('ARCHITECTURE LAYER 01','العمارة المؤسسية','ربط الأعمال والتشغيل والبيانات والسياسات والحوكمة')+board(node(470,40,260,70,'العمارة المؤسسية','strategy','gold','مركز المعمارية')+[['الرؤية والاستراتيجية','strategy'],['نماذج التشغيل','operations'],['الحوكمة التنفيذية','governance'],['إدارة المخاطر','quality'],['الاستدامة والأثر','strategy'],['الامتثال والسياسات','governance'],['بيانات العملاء','customer'],['بيانات العمليات','operations'],['منصة CRM','customer'],['نظام ERP','finance'],['BI Dashboard','kpi-nps'],['بوابة الشركاء','partners']].map((a,i)=>{let x=85+(i%6)*180,y=190+Math.floor(i/6)*130;return node(x,y,140,65,a[0],a[1],i%3==0?'gold':i%3==1?'blue':'teal')+line(600,110,x+70,y)}).join(''),470)}
function operating(){return head('ARCHITECTURE LAYER 02','النموذج التشغيلي','كيف تعمل رحائل من السوق حتى الولاء')+board(node(470,35,260,70,'النموذج التشغيلي','operations','gold','دورة تشغيل')+[['تطوير السوق','strategy'],['تصميم المنتجات','experience'],['إدارة الطلب','sales'],['المبيعات والتعاقد','sales'],['تصميم التجربة','experience'],['التخطيط التشغيلي','operations'],['تشغيل المرافق','operations'],['إدارة الشركاء','partners'],['الجودة والتحسين','quality'],['إدارة العلاقة','customer']].map((a,i)=>{let x=140+(i%5)*200,y=175+Math.floor(i/5)*130;return node(x,y,155,65,a[0],a[1],i%2?'blue':'teal')+line(600,105,x+78,y)}).join(''),430)}
function value(){let rows=[['سلسلة العميل',['الوعي','البحث','الحجز','الوصول','التجربة','المتابعة']],['سلسلة المرفق',['الجدوى','التأهيل','التجهيز','التشغيل','الصيانة','التطوير']],['سلسلة الشريك',['استقطاب','تأهيل','تعاقد','تكامل','تقييم','تطوير']]];let s='';rows.forEach((r,ri)=>{let y=80+ri*135;s+=`<text x="1120" y="${y+35}" fill="${ri==0?'#E8D084':ri==1?'#8BB8FF':'#80FFF1'}" font-size="13" font-weight="900">${r[0]}</text>`;r[1].forEach((t,i)=>{s+=node(880-i*145,y,118,62,t,ri==0?'customer':ri==1?'operations':'partners',ri==0?'gold':ri==1?'blue':'teal')})});return head('ARCHITECTURE LAYER 03','سلاسل القيمة','مسارات خلق القيمة دون أسهم مشوهة')+board(s,500)}
function capability(){let g=['القيادة والحوكمة','تطوير الأعمال','السوق والعملاء','تصميم التجارب','التشغيل والمرافق','الشركاء والتوريد','الجودة والتميز','الرقمنة والبيانات','الخدمات المساندة'];return head('ARCHITECTURE LAYER 04','خريطة القدرات','قدرات رحائل حسب الأهمية والنضج والاستثمار')+`<div class="grid3">${g.map((x,i)=>`<div class="card" onclick="openDrawer('${i<3?'strategy':i<5?'operations':i<7?'quality':'finance'}','${x}')"><span class="pill ${i<3?'gold':i<6?'blue':'teal'}">أولوية ${i<5?'١':'٢'}</span><h3>${x}</h3><p>مالك واضح، عمليات مرتبطة، مؤشر قياس، ومخاطر تحكم.</p></div>`).join('')}</div>`}
function customer(){return head('ARCHITECTURE LAYER 08','نظام إدارة العملاء','شرائح العملاء وقيمتهم ودورة علاقتهم مع رحائل')+board(node(470,45,260,70,'نظام إدارة العملاء','customer','gold','رئيس تجربة العميل')+[['النخبة','customer'],['العائلات','customer'],['الشركات','sales'],['الجهات الحكومية','sales'],['الوفود','experience'],['المناسبات','experience'],['الإحالات','loyalty'],['VIP','customer']].map((a,i)=>{let x=100+(i%4)*255,y=185+Math.floor(i/4)*120;return node(x,y,170,64,a[0],a[1],i%2?'blue':'teal')}).join(''),420)}
function partner(){return head('ARCHITECTURE LAYER 09','نظام إدارة الشركاء','الشركاء كامتداد لجودة رحائل لا كموردين فقط')+board(node(470,45,260,70,'نظام إدارة الشركاء','partners','gold','رئيس الشراكات')+['الضيافة','النقل','المرشدون','المرافق','الأغذية','التصوير','الفعاليات','التقنية'].map((a,i)=>{let x=100+(i%4)*255,y=185+Math.floor(i/4)*120;return node(x,y,170,64,a,'partners',i%2?'blue':'teal')}).join(''),420)}
function process(){return head('ARCHITECTURE LAYER 07','مشهد العمليات','عمليات رئيسية وداعمة مع أدوار وتقاطعات')+`<div class="tabs"><button class="tab active" onclick="tab('p','main',this)">العمليات الرئيسية</button><button class="tab" onclick="tab('p','support',this)">عمليات الدعم</button><button class="tab" onclick="tab('p','raci',this)">RACI</button></div><div id="p-main" class="tabpane active"><table class="table"><tr><th>العملية</th><th>المالك</th><th>التقاطع</th><th>المخرج</th><th>KPI</th></tr>${[['تأهيل العميل','رئيس المبيعات','تجربة العميل','فرصة مؤهلة','زمن التأهيل'],['تصميم التجربة','رئيس تجربة العميل','التشغيل والشركاء','سيناريو معتمد','قبول العرض'],['تخطيط التشغيل','رئيس التشغيل','الجودة والشركاء','أمر تشغيل','جاهزية 95٪'],['تنفيذ التجربة','رئيس التشغيل','الشركاء والجودة','تجربة مكتملة','الالتزام بالبرنامج'],['إغلاق التجربة','رئيس تجربة العميل','المالية والجودة','تقرير تجربة','NPS']].map(r=>`<tr onclick="openDrawer('operations','${r[0]}')">${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></div><div id="p-support" class="tabpane"><div class="grid4">${['الموارد البشرية','المشتريات والتوريد','الشؤون القانونية','المالية والمحاسبة','التقنية والبيئة','الأمن والسلامة','إدارة المعرفة','الأصول والمرافق'].map(x=>`<div class="card" onclick="openDrawer('finance','${x}')"><small>عملية دعم</small><h3>${x}</h3><p>تملك SLA داخلي وتدعم التشغيل بنقطة تصعيد واضحة ومخرج قابل للقياس.</p></div>`).join('')}</div></div><div id="p-raci" class="tabpane">${raci()}</div>`}
function raci(){let roles=['الرئيس التنفيذي','رئيس المبيعات','رئيس تجربة العميل','رئيس التشغيل','رئيس الشراكات','رئيس الجودة','الرئيس المالي'];let rows=['تأهيل العميل','تصميم التجربة','اعتماد السعر','أمر التشغيل','جاهزية التجربة','تنفيذ الخدمة','معالجة الشكوى'];let letters=['A','R','C','I'];return `<table class="table"><tr><th>العملية</th>${roles.map(r=>`<th>${r}</th>`).join('')}</tr>${rows.map((r,i)=>`<tr><td><b>${r}</b></td>${roles.map((role,j)=>`<td><span class="pill ${letters[(i+j)%4]=='A'?'gold':letters[(i+j)%4]=='R'?'teal':letters[(i+j)%4]=='C'?'blue':'purple'}">${letters[(i+j)%4]}</span></td>`).join('')}</tr>`).join('')}</table>`}
function journey(){let stages=['اكتشاف','استفسار','تأهيل','تصميم','تعاقد','تخطيط','تنفيذ','ولاء'];let lanes=[['العميل',['يبحث','يرسل طلب','يوضح الاحتياج','يعتمد','يدفع','يتلقى البرنامج','يعيش التجربة','يوصي']],['المبيعات',['حملة','استقبال','تأهيل','عرض','عقد','تسليم','متابعة','إعادة بيع']],['مدير التجربة',['','','تحليل','سيناريو','تعديل','جدول','إدارة توقعات','تفضيلات']],['التشغيل',['','','','','','موارد','تنفيذ','إغلاق']],['الجودة',['','','ملاءمة','مراجعة','اعتماد','جاهزية','مراقبة','تحسين']],['الأنظمة',['Lead','Ticket','Qualified','Proposal','Contract','Work Order','Live','NPS']]];return head('ARCHITECTURE LAYER 10','مخطط رحلة العميل','رحلة تشغيلية وليست تسويقية')+swim(stages,lanes)}
function service(){let stages=['طلب','تصميم','تعاقد','تجهيز','تنفيذ','إغلاق','متابعة','ولاء'];let lanes=[['واجهة العميل',['استفسار','جلسة فهم','اعتماد عرض','تأكيد','استقبال','تجربة','تقييم','عرض عودة']],['خلف الكواليس',['تسجيل','تحليل','تسعير','جدولة','تنسيق','إغلاق','تحليل','تصنيف']],['عمليات الدعم',['قالب','مكتبة تجارب','عقد','موارد','شركاء','مالية','جودة','CRM']],['الأنظمة',['موقع/واتساب','CRM','ERP','Ops','Portal','BI','NPS','Loyalty']],['بوابات الجودة',['تأهيل','تصميم','عقد','جاهزية','مراقبة','إغلاق','معالجة','تحسين']]];return head('ARCHITECTURE LAYER 11','مخطط الخدمة','تفاصيل الواجهة وما يحدث خلف الكواليس والأدوار')+swim(stages,lanes)}
function swim(stages,lanes){return `<div class="board"><div class="swim"><div class="sw-row headrow"><div class="sw-h">المسار</div>${stages.map(s=>`<div class="sw-h">${s}</div>`).join('')}</div>${lanes.map(l=>`<div class="sw-row"><div class="sw-l">${l[0]}</div>${l[1].map((c,i)=>`<div class="sw-cell">${c?`<div class="sw-card" onclick="openDrawer('${['lead','qualification','experience','sales','kpi-readiness','operations','kpi-nps','loyalty'][i]||'customer'}','${c}')"><b>${c}</b><span>${l[0]}</span></div>`:''}</div>`).join('')}</div>`).join('')}</div></div>`}
function organization(){return head('ARCHITECTURE LAYER 06','الهيكل التنظيمي','أدوار وترابط ولجان حوكمة دون تداخل')+board(node(500,40,200,64,'الرئيس التنفيذي','governance','gold','مالك نظام رحائل')+['رئيس المبيعات','رئيس تجربة العميل','رئيس التشغيل','رئيس الشراكات','رئيس الجودة','الرئيس المالي','رئيس التقنية'].map((t,i)=>node(80+i*155,170,130,56,t,['sales','experience','operations','partners','quality','finance','customer'][i],i%2?'blue':'teal')).join('')+['لجنة الحوكمة','لجنة المخاطر','لجنة الجودة','لجنة CX'].map((t,i)=>node(180+i*220,330,155,58,t,'governance','purple','قرار وتصعيد')).join(''),460)+`<div class="grid3"><div class="card" onclick="openDrawer('governance','لجنة الحوكمة')"><h3>لجنة الحوكمة</h3><p>تعتمد الصلاحيات وحدود القرار وتتابع إغلاق القرارات التنفيذية.</p></div><div class="card" onclick="openDrawer('quality','لجنة الجودة')"><h3>لجنة الجودة</h3><p>تراجع عدم المطابقة وتجارب VIP ومخاطر السمعة.</p></div><div class="card" onclick="openDrawer('customer','لجنة CX')"><h3>لجنة CX</h3><p>تتابع صوت العميل والولاء ومعالجة التجارب الضعيفة.</p></div></div>`}
function governance(){return head('ARCHITECTURE LAYER 12','مخطط الحوكمة','حوكمة قوية تربط الصلاحيات والتصعيد والاعتماد')+`<div class="grid3"><div class="card" onclick="openDrawer('governance','مجلس الحوكمة')"><span class="pill gold">أعلى سلطة</span><h3>مجلس الحوكمة</h3><p>يعتمد القرارات العابرة للإدارات ومخاطر السمعة والاستثمار.</p></div><div class="card" onclick="openDrawer('quality','بوابة الجودة')"><span class="pill teal">رقابة</span><h3>بوابات الجودة</h3><p>تمنع انتقال الخدمة قبل اكتمال المعايير.</p></div><div class="card" onclick="openDrawer('decision-pricing','الصلاحيات')"><span class="pill blue">قرار</span><h3>حدود الصلاحيات</h3><p>تحدد من يعتمد السعر والخصم والتصعيد والإلغاء.</p></div></div>${board(node(485,40,230,70,'مجلس الحوكمة','governance','gold','الرئيس التنفيذي')+['السعر','الجودة','السلامة','الشريك','العميل','الاستثمار'].map((x,i)=>node(120+i*170,200,130,58,x,i==0?'decision-pricing':i==1?'quality':i==3?'partners':'governance',i%2?'blue':'teal')).join(''),360)}`}
function decision(){return head('ARCHITECTURE LAYER 13','مصفوفة القرارات','قرارات واضحة بنقاط قوة وملاك وصلاحيات')+`<table class="table"><tr><th>نوع القرار</th><th>المالك</th><th>نقطة القوة</th><th>متى يصعد؟</th><th>KPI</th></tr>${[['التسعير','رئيس المبيعات + الرئيس المالي','يحمي الهامش ويضبط الخصومات','إذا انخفض الهامش عن الحد الأدنى','متوسط قيمة الحجز'],['جودة التجربة','رئيس الجودة','يمنع إطلاق تجربة غير جاهزة','عند وجود ملاحظة حرجة','عدم المطابقة'],['الشراكة','رئيس الشراكات','يحمي العلامة من المورد الضعيف','عند تكرار إخفاق الشريك','التزام SLA'],['تعويض العميل','رئيس تجربة العميل','يعالج الضرر قبل تحوله لسمعة سلبية','عند NPS منخفض','زمن المعالجة'],['إلغاء أو تأجيل','الرئيس التنفيذي','يحسم مخاطر السلامة والسمعة','عند تعارض السلامة أو الطقس','زمن القرار']].map(r=>`<tr onclick="openDrawer('decision-pricing','${r[0]}')">${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`}
function information(){return generic('ARCHITECTURE LAYER 14','تدفق المعلومات','من بيانات العميل والتشغيل إلى قرار تنفيذي',['قنوات الدخول','ملف العميل','ملف التجربة','أمر التشغيل','تقييم الجودة','تقرير BI','قرار تنفيذي'])}
function crm(){return generic('ARCHITECTURE LAYER 15','CRM Blueprint','دورة حياة العميل داخل نظام العلاقة',['Lead','Qualified','Proposal','Contract','Planning','Execution','NPS','Loyalty','Referral'])}
function digital(){return generic('ARCHITECTURE LAYER 16','المعمارية الرقمية','منظومة أنظمة رحائل الداعمة للتشغيل',['الموقع','واتساب','CRM','ERP','بوابة العميل','بوابة الشركاء','BI','AI','API'])}
function kpi(){let rows=[['NPS','رئيس تجربة العميل','نسبة المروجين - نسبة المنتقدين','شهري','تحسين الولاء'],['جاهزية التجربة','رئيس التشغيل','العناصر المكتملة ÷ إجمالي العناصر × 100','قبل كل تجربة','منع فشل الانطباع الأول'],['هامش التجربة','الرئيس المالي','الإيراد - التكلفة ÷ الإيراد × 100','بعد الإغلاق','حماية الربحية'],['التزام الشركاء','رئيس الشراكات','الخدمات المطابقة ÷ إجمالي خدمات الشريك × 100','شهري','رفع الجودة الخارجية'],['زمن إصدار العرض','رئيس المبيعات','وقت إرسال العرض - وقت تأهيل العميل','يومي','رفع التحويل']];return head('ARCHITECTURE LAYER 21','معمارية KPI','مؤشرات مع طريقة حساب ومالك وقرار مرتبط')+`<table class="table"><tr><th>المؤشر</th><th>المالك</th><th>طريقة الحساب</th><th>الدورية</th><th>قرار الإدارة</th></tr>${rows.map((r,i)=>`<tr onclick="openDrawer('${i==0?'kpi-nps':i==1?'kpi-readiness':i==2?'finance':'quality'}','${r[0]}')">${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table><div class="grid3" style="margin-top:16px">${rows.slice(0,3).map((r,i)=>`<div class="card metric" onclick="openDrawer('${i==0?'kpi-nps':i==1?'kpi-readiness':'finance'}','${r[0]}')"><small>${r[1]}</small><h3>${r[0]}</h3><p>${r[2]}</p></div>`).join('')}</div>`}
function generic(code,title,sub,items){return head(code,title,sub)+board(node(470,45,260,70,title,'strategy','gold','مركز الصفحة')+items.map((x,i)=>node(100+(i%4)*255,185+Math.floor(i/4)*120,170,64,x,i%2?'operations':'customer',i%2?'blue':'teal')).join(''),420)}
function tab(p,id,b){document.querySelectorAll(`[id^="${p}-"]`).forEach(e=>e.classList.remove('active'));document.getElementById(p+'-'+id).classList.add('active');b.parentElement.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
const renderers={home,enterprise:arch,operating,value,capability,customer,partner,process,journey,service,organization,governance,decision,information,crm,digital,kpi};
function init(){let nav=document.getElementById('nav'),last='';navItems.forEach(n=>{if(n[2]!=last){last=n[2];nav.innerHTML+=`<div class="group">${last}</div>`}nav.innerHTML+=`<div class="nav ${n[0]=='home'?'active':''}" data-id="${n[0]}" data-search="${n.join(' ')}" onclick="show('${n[0]}',this)"><div class="ico">${n[3]}</div><span>${n[1]}</span></div>`});show('home',document.querySelector('.nav'))}
function show(id,el){document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));if(el)el.classList.add('active');let m=navItems.find(x=>x[0]==id);document.getElementById('bc').textContent=m?m[1]:id;document.getElementById('content').innerHTML=(renderers[id]||home)();document.getElementById('content').scrollTop=0}
function filterNav(q){q=(q||'').trim();document.querySelectorAll('.nav').forEach(n=>n.style.display=!q||n.dataset.search.includes(q)?'flex':'none')}
init();
</script></body></html>
